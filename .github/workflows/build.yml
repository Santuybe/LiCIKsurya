name: Build Kernel and Release

on:
  push:
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      DATE: ${{ steps.setdate.outputs.DATE }}
    steps:
      - id: setdate
        run: |
          echo "DATE=$(TZ=Asia/Jakarta date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

  build_kernel:
    name: Build Kernel and Release
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        include:
          - variant: "Tiramisu"
            root: "KSU"
          - variant: "Tiramisu"
            root: "NoKSU"
          - variant: "SnowCone"
            root: "KSU"
          - variant: "SnowCone"
            root: "NoKSU"

    steps:
    - name: Checkout Workflow & Local Files
      uses: actions/checkout@v4

    - name: Set Environment
      run: |
        echo "VARIANT=${{ matrix.variant }}" >> $GITHUB_ENV
        echo "ROOT=${{ matrix.root }}" >> $GITHUB_ENV
        echo "DATE=${{ needs.prepare.outputs.DATE }}" >> $GITHUB_ENV
        echo "ARTIFACT=$GITHUB_WORKSPACE/artifact" >> $GITHUB_ENV
        echo "KERNEL_URL=https://github.com/Cilok-LAB/android_kernel_xiaomi_surya.git" >> $GITHUB_ENV
        echo "KERNEL_BRANCH=rethinking" >> $GITHUB_ENV

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y device-tree-compiler bc build-essential flex bison libssl-dev libelf-dev clang lld
        mkdir -p ${{ env.ARTIFACT }}

    - name: Fetch Remote Kernel Source
      run: |
        git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_URL }} kernel_workspace

    - name: Setup Droidspaces Configs
      run: |
        # Memastikan direktori tujuan ada dan salin config dari repo lokal
        mkdir -p kernel_workspace/arch/arm64/configs/
        cp configs/droidspaces.config kernel_workspace/arch/arm64/configs/
        cp configs/droidspaces-additional.config kernel_workspace/arch/arm64/configs/ || true

    - name: Patch build.sh with buildpatch.sh
      run: |
        # Berikan izin eksekusi pada patcher dan build.sh asli
        chmod +x patch/buildpatch.sh
        chmod +x build.sh
        # Jalankan patcher untuk menyisipkan logika droidspaces ke build.sh
        ./patch/buildpatch.sh build.sh

    - name: Download and Apply All Droidspaces Patches
      run: |
        cd kernel_workspace
        # Daftar URL patch (bisa ditambah sesuai kebutuhan)
        URLS=(
          "https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/non-GKI/01.fix_kernel_panic_in_xt_qtaguid.patch"
          "https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/non-GKI/02.fix_restore%20cgroup%20file%20prefix%20handling%20.patch"
        )
        
        for url in "${URLS[@]}"; do
          wget -q "$url"
        done

        # Terapkan semua file .patch yang ada di folder
        for p in *.patch; do
          echo "Applying $p..."
          patch -p1 < "$p"
        done

    - name: Building
      run: |
        # Eksekusi build.sh yang sudah dipatch
        ./build.sh ${{ env.VARIANT }} ${{ env.ROOT }} ${{ env.DATE }} ${{ env.ARTIFACT }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: rethinking-${{ env.VARIANT }}-${{ env.ROOT }}-${{ env.DATE }}
        path: ${{ env.ARTIFACT }}/*

  create_release:
    needs: [prepare, build_kernel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup git authentication
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Set DATE and TAG
        run: |
          echo "TAG=${{ needs.prepare.outputs.DATE }}" >> $GITHUB_ENV
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifact
      - name: Create Git tag
        run: |
          git tag -a "$TAG" -m "Build Kernel Release"
          git push origin "$TAG"
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
          files: artifact/**
          body: |
            Device Target: POCO X3 NFC (surya)
            Kernel Source: https://github.com/Cilok-LAB/android_kernel_xiaomi_surya.git
            Features: Droidspaces Patched (Full Config), build.sh Auto-patched.
            
