name: Build LiCIK Kernel

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Select device'
        required: true
        default: 'all'
        type: choice
        options:
          - surya
          - msm8937
          - t0lte
          - all
      feature:
        description: 'Select build feature'
        required: true
        default: 'base'
        type: choice
        options:
          - base
          - droidspace
          - nethunter
          - all

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ github.event.inputs.device }}" == "all" ]]; then
            echo 'matrix={"include":[{"device":"surya"},{"device":"msm8937"},{"device":"t0lte"}]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"include":[{"device":"${{ github.event.inputs.device }}"}]}' >> $GITHUB_OUTPUT
          fi

  build_kernel:
    name: Build LiCIK (${{ github.event.inputs.feature }}) for ${{ matrix.device }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    permissions:
      contents: write

    steps:
    - name: Checkout Workflow & Local Configs
      uses: actions/checkout@v4

    - name: Set Variables
      run: |
        echo "DATE=$(TZ=Asia/Jakarta date +%Y%m%d%H%M)" >> $GITHUB_ENV
        echo "ARTIFACT=$GITHUB_WORKSPACE/artifact" >> $GITHUB_ENV
        if [[ "${{ matrix.device }}" == "surya" ]]; then
          echo "KERNEL_URL=https://github.com/crdroidandroid/android_kernel_xiaomi_surya.git" >> $GITHUB_ENV
          echo "KERNEL_BRANCH=16.0" >> $GITHUB_ENV
        elif [[ "${{ matrix.device }}" == "msm8937" ]]; then
          echo "KERNEL_URL=https://github.com/LineageOS/android_kernel_xiaomi_msm8937.git" >> $GITHUB_ENV
          echo "KERNEL_BRANCH=lineage-22.2" >> $GITHUB_ENV
        elif [[ "${{ matrix.device }}" == "t0lte" ]]; then
          echo "KERNEL_URL=https://github.com/html6405/android_kernel_samsung_smdk4412.git" >> $GITHUB_ENV
          echo "KERNEL_BRANCH=lineage-21.0-3.0" >> $GITHUB_ENV
        fi

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y device-tree-compiler bc build-essential flex bison libssl-dev libelf-dev clang lld wget python3 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi zip unzip libarchive-tools zstd
        mkdir -p ${{ env.ARTIFACT }}

    - name: Fetch Kernel Source
      run: |
        git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_URL }} kernel_workspace

    - name: Apply Patches
      run: |
        cd kernel_workspace
        if [[ "${{ github.event.inputs.feature }}" == "droidspace" ]]; then
          echo "Applying Droidspace patches..."
          for p in ../patches/*.patch; do
            # Skip device-specific patches if not for this device
            if [[ "$p" == *"-t0lte.patch" ]] && [[ "${{ matrix.device }}" != "t0lte" ]]; then
              continue
            fi
            # Skip generic version of a device-specific patch
            if [[ "$p" == *"01-droidspace.patch" ]] && [[ "${{ matrix.device }}" == "t0lte" ]]; then
              continue
            fi

            echo "Applying $p..."
            patch -p1 --forward --batch < "$p" || echo "Failed: $p"
          done
        fi

    - name: Setup Configs
      run: |
        if [[ "${{ matrix.device }}" == "t0lte" ]]; then
          ARCH_DIR="arm"
        else
          ARCH_DIR="arm64"
        fi
        mkdir -p kernel_workspace/arch/$ARCH_DIR/configs/
        cp configs/*.config kernel_workspace/arch/$ARCH_DIR/configs/

    - name: Building
      run: |
        cp scripts/${{ matrix.device }}.sh kernel_workspace/build.sh
        cd kernel_workspace
        chmod +x build.sh
        ./build.sh ${{ github.event.inputs.feature }}

    - name: Extract Metadata
      id: metadata
      run: |
        cd kernel_workspace
        VERSION=$(grep "^VERSION =" Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep "^PATCHLEVEL =" Makefile | awk '{print $3}')
        SUBLEVEL=$(grep "^SUBLEVEL =" Makefile | awk '{print $3}')
        EXTRAVERSION=$(grep "^EXTRAVERSION =" Makefile | awk '{print $3}')
        echo "KV=$VERSION.$PATCHLEVEL.$SUBLEVEL$EXTRAVERSION" >> $GITHUB_OUTPUT
        OWNER=$(echo "${{ env.KERNEL_URL }}" | sed -E 's/.*github.com\/([^\/]+).*/\1/')
        echo "OWNER=$OWNER" >> $GITHUB_OUTPUT

    - name: Move ZIP to Artifact
      run: |
        mv kernel_workspace/*.zip ${{ env.ARTIFACT }}/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: LiCIK-${{ matrix.device }}-${{ github.event.inputs.feature }}-${{ env.DATE }}
        path: ${{ env.ARTIFACT }}/*

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ matrix.device }}
        files: ${{ env.ARTIFACT }}/*
        body: |
          ## 🔖 LiCIK Kernel for ${{ matrix.device }}

          - 🪪 **Author:** ${{ steps.metadata.outputs.OWNER }}
          - 🎯 **Kernel Source:** ${{ env.KERNEL_URL }}
          - 🧭 **Kernel Version:** ${{ steps.metadata.outputs.KV }}
          - 📅 **Build Date:** ${{ env.DATE }}
